# Run with:
#   pre-commit install
#   pre-commit run --all-files

default_language_version:
  python: python3.12

minimum_pre_commit_version: "3.5.0"

repos:
  # ---------------------------------------------------------
  # Basic hygiene & safety checks
  # ---------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: detect-private-key
      - id: mixed-line-ending
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # ---------------------------------------------------------
  # Ruff: Linting (FAST, strict, production rules)
  # ---------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff
        name: ruff-lint
        args:
          - --fix
          - --exit-non-zero-on-fix
        types_or: [python]

  # ---------------------------------------------------------
  # Ruff: Formatting (replaces black)
  # ---------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.2.2
    hooks:
      - id: ruff-format
        name: ruff-format
        types_or: [python]

  # ---------------------------------------------------------
  # Static type checking (production safety net)
  # ---------------------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args:
          - --strict
          - --ignore-missing-imports
        additional_dependencies:
          - types-requests
          - types-PyYAML

  # ---------------------------------------------------------
  # Security scanning (catch dumb mistakes early)
  # ---------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args:
          - -q
          - -r
          - .
        exclude: tests/

